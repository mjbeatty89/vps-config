# VPS Docker Stack - virtual-tunnel-vnic (147.224.179.179)
# All services bind to 127.0.0.1 only; Caddy handles external TLS termination
# Data persisted in /opt/docker/<service>

services:

  # ── Dashboard ─────────────────────────────────────────────────────────────
  heimdall:
    image: lscr.io/linuxserver/heimdall:latest
    container_name: heimdall
    environment:
      - PUID=1002
      - PGID=1002
      - TZ=America/Detroit
    volumes:
      - /opt/docker/heimdall:/config
    ports:
      - "127.0.0.1:8080:80"
    restart: unless-stopped

  # ── Workflow Automation ────────────────────────────────────────────────────
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    environment:
      - N8N_HOST=n8n.aadd.rocks
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://n8n.aadd.rocks/
      - TZ=America/Detroit
      # Uncomment to set a secure encryption key (required for credential storage):
      # - N8N_ENCRYPTION_KEY=change_me_to_a_long_random_string
    volumes:
      - /opt/docker/n8n:/home/node/.n8n
    ports:
      - "127.0.0.1:5678:5678"
    restart: unless-stopped

  # ── Uptime Monitoring ──────────────────────────────────────────────────────
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    volumes:
      - /opt/docker/uptime-kuma:/app/data
    ports:
      - "127.0.0.1:3001:3001"
    restart: unless-stopped

  # ── Container Management UI ────────────────────────────────────────────────
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/docker/portainer:/data
    ports:
      - "127.0.0.1:9000:9000"
    restart: unless-stopped
